<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Crayon Style Transformer</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #ffffff;
        text-align: center;
    }

    h1 {
        margin: 20px;
        font-size: 22px;
    }

    #controls {
        margin-bottom: 10px;
    }

    canvas {
        border: 2px dashed #ccc;
        margin-top: 10px;
        background: white;
    }

    input {
        padding: 10px;
    }

    button {
        padding: 10px 15px;
        cursor: pointer;
        background: #ffcc00;
        border: none;
        border-radius: 8px;
        font-weight: bold;
    }
</style>
</head>
<body>

<h1>🖍 Crayon-Style Image Transformer</h1>

<div id="controls">
    <input type="file" id="upload" accept="image/*">
    <button onclick="transform()">Transform</button>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let img = new Image();

document.getElementById("upload").onchange = function (e) {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function (event) {
        img = new Image();
        img.onload = function () {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
        }
        img.src = event.target.result;
    }

    reader.readAsDataURL(file);
};

function crayonFilter() {
    let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let data = imageData.data;

    // simple "crayon effect" (posterize + color shift)
    for (let i = 0; i < data.length; i += 4) {
        data[i] = Math.min(255, data[i] * 1.2 + 20);     // red boost
        data[i+1] = Math.min(255, data[i+1] * 0.9 + 30); // green shift
        data[i+2] = Math.min(255, data[i+2] * 1.3);      // blue boost

        // posterize effect
        data[i] = (data[i] / 32) * 32;
        data[i+1] = (data[i+1] / 32) * 32;
        data[i+2] = (data[i+2] / 32) * 32;
    }

    ctx.putImageData(imageData, 0, 0);
}

function doodles() {
    const w = canvas.width;
    const h = canvas.height;

    function star(x,y,size){
        ctx.fillStyle = "gold";
        ctx.beginPath();
        for(let i=0;i<5;i++){
            ctx.lineTo(x + Math.cos((18+i*72)/180*Math.PI)*size,
                       y + Math.sin((18+i*72)/180*Math.PI)*size);
            ctx.lineTo(x + Math.cos((54+i*72)/180*Math.PI)*size/2,
                       y + Math.sin((54+i*72)/180*Math.PI)*size/2);
        }
        ctx.closePath();
        ctx.fill();
    }

    function cloud(x,y){
        ctx.fillStyle = "#eee";
        ctx.beginPath();
        ctx.arc(x, y, 20, 0, Math.PI*2);
        ctx.arc(x+20, y+10, 25, 0, Math.PI*2);
        ctx.arc(x-20, y+10, 25, 0, Math.PI*2);
        ctx.fill();
    }

    function candy(x,y){
        ctx.fillStyle = "#ff69b4";
        ctx.fillRect(x,y,20,10);
        ctx.beginPath();
        ctx.arc(x,y+5,5,0,Math.PI*2);
        ctx.arc(x+20,y+5,5,0,Math.PI*2);
        ctx.fill();
    }

    function castle(x,y){
        ctx.fillStyle = "#caa472";
        ctx.fillRect(x,y,60,60);
        ctx.fillRect(x+10,y-20,15,20);
        ctx.fillRect(x+35,y-20,15,20);
    }

    for(let i=0;i<10;i++){
        star(Math.random()*w, Math.random()*h, 10+Math.random()*10);
        cloud(Math.random()*w, Math.random()*h);
        candy(Math.random()*w, Math.random()*h);
        castle(Math.random()*w, Math.random()*h);
    }
}

function transform() {
    ctx.drawImage(img, 0, 0);
    crayonFilter();
    doodles();
}
</script>

</body>
</html>
